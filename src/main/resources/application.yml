server:
  port: 8080

spring:
  application:
    name: short-link
  autoconfigure:
    exclude:
      - org.apache.rocketmq.spring.autoconfigure.RocketMQAutoConfiguration
  datasource:
    url: jdbc:mysql://localhost:3306/example_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 6000ms

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

rocketmq:
  name-server: localhost:9876
  producer:
    group: short-link-producer-group
    send-message-timeout: 30000
  consumer:
    group: short-link-consumer-group

logging:
  level:
    com.example.shortlink: DEBUG
    org.mybatis: DEBUG